<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crypto Nova | 仮想通貨でチャンスを掴みたいあなたへ</title>
  <meta name="description" content="Crypto Novaは、仮想通貨市場の膨大なデータから次に注目されやすい仮想通貨候補だけを抽出する分析アプリです。">

  <!-- OGP -->
  <meta property="og:title" content="Crypto Nova | 仮想通貨でチャンスを掴みたいあなたへ">
  <meta property="og:description" content="約180万種類以上の仮想通貨から、見るべき候補だけを表示。">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://cryptonova.jp/">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700;900&family=Playfair+Display:wght@400;700;900&family=Inter:wght@400;600;700;900&family=Cormorant+Garamond:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">

  <!-- CSS（役割ごとに分離） -->
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/section-01-hero.css">
  <!-- 今後セクション追加時はここに1行ずつ追加 -->
  <!-- <link rel="stylesheet" href="css/section-02-question.css"> -->
</head>
<body>

  <!-- HEADER -->
  <header class="header">
    <div class="header__logo">Crypto Nova</div>
    <a href="#cta" class="header__cta">今すぐ始める</a>
  </header>

  <!-- SECTION 1: HERO -->
  <section class="hero" id="hero">

    <div class="hero__gradient"></div>

    <div class="hero__video-layer">
      <video autoplay muted loop playsinline>
        <source src="fv-video.mp4" type="video/mp4">
      </video>
    </div>

    <canvas class="hero__particles" id="particles"></canvas>

    <div class="hero__content">

      <div class="hero__text-top">
        <div class="hero__badge">
          <span class="hero__badge-dot"></span>
          法令遵守認定・各広告媒体で出稿中
        </div>

        <h1 class="hero__catch">
          仮想通貨で<br>チャンスを掴みたい<br>あなたへ
        </h1>

        <p class="hero__sub">
          約180万種類の仮想通貨から、<br>
          注目すべき候補だけを抽出する分析アプリ
        </p>
      </div>

      <div class="hero__visual">
        <div class="hero__person">
          <img src="fv-woman.webp" alt="Crypto Novaを使う人物イメージ">
        </div>
      </div>

      <div class="hero__text-bottom">
        <a href="#cta" class="hero__cta">
          今すぐアプリを見る
          <svg class="hero__cta-arrow" width="20" height="20" viewBox="0 0 20 20" fill="none">
            <path d="M4 10H16M16 10L11 5M16 10L11 15" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </a>

        <div class="hero__trust-text">
          <span>
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2.5 7.5L5.5 10.5L11.5 4.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
            スマホ・PC対応
          </span>
          <span>
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2.5 7.5L5.5 10.5L11.5 4.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
            マニュアル完備
          </span>
        </div>
      </div>

    </div>

  </section>

  <!-- JavaScript -->
  <script src="js/particles.js"></script>

</body>
</html>
